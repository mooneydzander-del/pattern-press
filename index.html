  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ody{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif}\n  body{min-height:100vh;display:flex;flex-direction:column}\n  /* top bar */\n  .topbar{\n    border-bottom:3px solid var(--ink);\n    background:var(--panel);\n    padding:14px 22px;\n    display:flex;align-items:center;justify-content:space-between;gap:16px;\n  }\n  .brand{display:flex;align-items:center;gap:12px}\n  .logo{\n    width:44px;height:44px;border:3px solid var(--ink);background:var(--rust);\n    display:grid;place-items:center;font-family:'Anton',sans-serif;color:var(--bg);\n    font-size:24px;line-height:1;\n  }\n  .brand h1{font-family:'Anton',sans-serif;font-weight:400;font-size:22px;margin:0;letter-spacing:.5px}\n  .brand .sub{font-size:12px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}\n  .topbar .right{display:flex;gap:10px;align-items:center}\n  .pill{font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border:2px solid var(--ink);background:var(--cream);font-weight:600}\n\n  /* layout */\n  .app{flex:1;display:grid;grid-template-columns:340px 340px 1fr;gap:0;min-height:0}\n  .panel{border-right:3px solid var(--ink);overflow:auto;padding:18px;background:var(--panel)}\n  .panel:last-child{border-right:none;background:var(--bg)}\n  .panel h2{\n    font-family:'Anton',sans-serif;font-weight:400;font-size:16px;margin:0 0 12px 0;\n    letter-spacing:1px;text-transform:uppercase;\n    display:flex;align-items:center;gap:8px;\n  }\n  .panel h2::before{content:\"\";display:inline-block;width:10px;height:10px;background:var(--rust);border:2px solid var(--ink)}\n  .section{margin-bottom:22px;padding-bottom:18px;border-bottom:2px dashed #d9d1c2}\n  .section:last-child{border-bottom:none}\n  .section .label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#222;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}\n  .section .label .val{color:var(--rust);font-family:'JetBrains Mono',monospace;font-weight:600;font-size:11px}\n  .sub{font-size:11px;color:var(--muted)}\n\n  /* preset grid */\n  .preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}\n  .swatch{\n    position:relative;\n    aspect-ratio:1;\n    border:2px solid var(--ink);\n    cursor:pointer;\n    overflow:hidden;\n    transition:transform .12s ease;\n    background:#eee;\n  }\n  .swatch:hover{transform:translate(-1px,-1px)}\n  .swatch.active{border-color:var(--rust);border-width:3px;transform:scale(1.04);box-shadow:3px 3px 0 var(--ink)}\n  .swatch .name{\n    position:absolute;left:0;right:0;bottom:0;\n    background:rgba(13,13,13,.82);color:#FAF7F0;\n    font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;\n    padding:3px 5px;text-align:center;\n  }\n  .swatch .del{\n    position:absolute;top:3px;right:3px;width:18px;height:18px;\n    background:var(--ink);color:var(--bg);border:none;cursor:pointer;\n    font-size:11px;line-height:1;display:none;\n  }\n  .swatch.custom .del{display:block}\n\n  /* upload zone */\n  .upload{\n    margin-top:10px;\n    border:2.5px dashed var(--ink);\n    padding:14px;text-align:center;cursor:pointer;\n    background:var(--cream);\n    font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;\n    transition:background .15s;\n  }\n  .upload:hover,.upload.drag{background:#f0dcbd}\n  .upload .big{font-size:22px;line-height:1;margin-bottom:4px}\n\n  /* controls */\n  .row{display:flex;gap:8px;align-items:center}\n  input[type=range]{width:100%;accent-color:var(--rust);margin:4px 0}\n  input[type=text],textarea,select{\n    width:100%;border:2px solid var(--ink);background:var(--bg);\n    padding:8px 10px;font-family:inherit;font-size:13px;color:var(--ink);\n  }\n  textarea{resize:vertical;min-height:110px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.5}\n  select{appearance:none;-webkit-appearance:none;background:var(--bg) url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%230D0D0D'/><\u002Fsvg>\") no-repeat right 10px center;padding-right:28px}\n  input:focus,textarea:focus,select:focus{outline:2px solid var(--rust);outline-offset:-2px}\n\n  .chipset{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}\n  .chip{\n    border:2px solid var(--ink);background:var(--bg);\n    padding:5px 9px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;\n    cursor:pointer;\n  }\n  .chip.active{background:var(--ink);color:var(--bg)}\n  .chip.color-chip{padding:0;width:28px;height:28px;display:inline-block;position:relative}\n  .chip.color-chip.active{outline:2px solid var(--rust);outline-offset:2px}\n\n  .btn{\n    border:2px solid var(--ink);background:var(--bg);color:var(--ink);\n    font-family:inherit;font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;\n    padding:10px 14px;cursor:pointer;\n    transition:transform .1s;\n  }\n  .btn:hover{transform:translate(-1px,-1px)}\n  .btn:active{transform:translate(0,0)}\n  .btn.primary{background:var(--rust);color:#fff}\n  .btn.primary:hover{background:var(--rust-dark)}\n  .btn.block{width:100%}\n  .btn-row{display:flex;gap:8px}\n\n  /* right panel */\n  .preview-head{\n    display:flex;align-items:center;justify-content:space-between;gap:10px;\n    margin-bottom:14px;flex-wrap:wrap;\n  }\n  .bg-picker{display:flex;gap:6px}\n  .bg-dot{width:26px;height:26px;border:2px solid var(--ink);cursor:pointer}\n  .bg-dot.active{outline:2px solid var(--rust);outline-offset:2px}\n\n  .grid{\n    display:grid;\n    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));\n    gap:14px;\n  }\n  .card{\n    border:3px solid var(--ink);\n    background:var(--bg);\n    display:flex;flex-direction:column;\n  }\n  .card .preview{\n    aspect-ratio:4500/5400;\n    display:grid;place-items:center;\n    overflow:hidden;position:relative;\n  }\n  .card .preview svg{width:100%;height:100%;display:block}\n  .card .meta{\n    border-top:2px solid var(--ink);\n    padding:8px 10px;display:flex;justify-content:space-between;align-items:center;gap:8px;\n  }\n  .card .meta .slogan{\n    font-family:'Anton',sans-serif;font-size:14px;letter-spacing:.5px;\n    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\n  }\n  .card .meta button{\n    border:2px solid var(--ink);background:var(--bg);\n    font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;\n    padding:4px 8px;cursor:pointer;flex-shrink:0;\n  }\n  .card .meta button:hover{background:var(--ink);color:var(--bg)}\n\n  .empty{\n    border:3px dashed var(--ink);padding:40px 20px;text-align:center;\n    color:var(--muted);font-size:13px;\n  }\n  .empty .big{font-family:'Anton',sans-serif;font-size:22px;color:var(--ink);margin-bottom:6px;letter-spacing:1px}\n\n  /* saved presets */\n  .saved-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}\n  .saved-item{\n    display:flex;align-items:center;justify-content:space-between;gap:8px;\n    border:2px solid var(--ink);padding:6px 8px;background:var(--bg);\n    font-size:12px;font-weight:600;\n  }\n  .saved-item .actions{display:flex;gap:4px}\n  .saved-item button{\n    border:2px solid var(--ink);background:var(--bg);padding:2px 6px;font-size:10px;\n    font-weight:700;text-transform:uppercase;cursor:pointer;\n  }\n  .saved-item button:hover{background:var(--ink);color:var(--bg)}\n\n  /* toast */\n  .toast{\n    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);\n    background:var(--ink);color:var(--bg);padding:10px 16px;\n    border:2px solid var(--ink);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;\n    z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;\n  }\n  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}\n\n  /* scrollbars */\n  .panel::-webkit-scrollbar{width:10px}\n  .panel::-webkit-scrollbar-track{background:var(--panel)}\n  .panel::-webkit-scrollbar-thumb{background:var(--ink);border:2px solid var(--panel)}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<div class=\"topbar\">\n  <div class=\"brand\">\n    <div class=\"logo\">P<\u002Fdiv>\n    <div>\n      <h1>PATTERN PRESS<\u002Fh1>\n      <div class=\"sub\">Pattern-fill text · Etsy design suite<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"right\">\n    <span class=\"pill\" id=\"statusPill\">Ready<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"app\">\n  <!-- LEFT PANEL -->\n  <section class=\"panel\" id=\"leftPanel\">\n    <h2>Pattern &amp; Slogans<\u002Fh2>\n\n    <div class=\"section\">\n      <div class=\"label\">Preset library <span class=\"sub\" id=\"patternCount\"><\u002Fspan><\u002Fdiv>\n      <div class=\"preset-grid\" id=\"presetGrid\"><\u002Fdiv>\n\n      <div class=\"upload\" id=\"uploadZone\">\n        <div class=\"big\">+<\u002Fdiv>\n        <div>Drop or click to upload<\u002Fdiv>\n        <div class=\"sub\" style=\"margin-top:3px;text-transform:none;letter-spacing:0\">PNG, JPG, WebP — tiles automatically<\u002Fdiv>\n        <input type=\"file\" id=\"fileInput\" accept=\"image/png,image/jpeg,image/webp\" hidden=\"\" multiple=\"\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"label\">Pattern scale <span class=\"val\" id=\"scaleVal\">100%<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"scale\" min=\"10\" max=\"300\" value=\"100\">\n\n      <div class=\"label\" style=\"margin-top:10px\">Offset X <span class=\"val\" id=\"offsetXVal\">0<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"offsetX\" min=\"-200\" max=\"200\" value=\"0\">\n\n      <div class=\"label\" style=\"margin-top:10px\">Offset Y <span class=\"val\" id=\"offsetYVal\">0<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"offsetY\" min=\"-200\" max=\"200\" value=\"0\">\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"label\">Slogans <span class=\"sub\">one per line<\u002Fspan><\u002Fdiv>\n      <textarea id=\"slogans\" spellcheck=\"false\">DARLIN'\nMAMA\nHOWDY\nY'ALL\nHOT MESS\nWILD CHILD\nCOWGIRL\nCOUNTRY ROOTS<\u002Ftextarea>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"label\">Saved presets<\u002Fdiv>\n      <div class=\"btn-row\">\n        <button class=\"btn block\" id=\"savePresetBtn\">+ Save current<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"saved-list\" id=\"savedList\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MIDDLE PANEL -->\n  <section class=\"panel\" id=\"midPanel\">\n    <h2>Text &amp; Outline<\u002Fh2>\n\n    <div class=\"section\">\n      <div class=\"label\">Font<\u002Fdiv>\n      <select id=\"font\">\n        <option value=\"Anton\" selected=\"\">Anton (recommended)<\u002Foption>\n        <option value=\"Archivo Black\">Archivo Black<\u002Foption>\n        <option value=\"Bebas Neue\">Bebas Neue<\u002Foption>\n        <option value=\"Bungee\">Bungee<\u002Foption>\n        <option value=\"Oswald\">Oswald Bold<\u002Foption>\n        <option value=\"Abril Fatface\">Abril Fatface<\u002Foption>\n        <option value=\"DM Serif Display\">DM Serif Display<\u002Foption>\n        <option value=\"Permanent Marker\">Permanent Marker<\u002Foption>\n        <option value=\"Playfair Display\">Playfair Display Black<\u002Foption>\n        <option value=\"Fraunces\">Fraunces Black<\u002Foption>\n        <optgroup label=\"Custom fonts\">\n          <option value=\"Nectarine\">Nectarine<\u002Foption>\n          <option value=\"Varsity Team\">Varsity Team<\u002Foption>\n        <\u002Foptgroup>\n      <\u002Fselect>\n      <div style=\"margin-top:8px\">\n        <label class=\"btn block\" style=\"display:block;text-align:center;cursor:pointer;font-size:11px;padding:7px 10px\">\n          + Upload custom font\n          <input type=\"file\" id=\"fontUpload\" accept=\".otf,.ttf,.woff,.woff2,font/*\" hidden=\"\" multiple=\"\">\n        <\u002Flabel>\n      <\u002Fdiv>\n\n      <div class=\"label\" style=\"margin-top:12px\">Font size <span class=\"val\" id=\"fontSizeVal\">900<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"fontSize\" min=\"300\" max=\"1600\" value=\"900\" step=\"10\">\n\n      <div class=\"label\" style=\"margin-top:10px\">Letter spacing <span class=\"val\" id=\"letterSpacingVal\">-10<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"letterSpacing\" min=\"-50\" max=\"200\" value=\"-10\">\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"label\">Text transform<\u002Fdiv>\n      <div class=\"chipset\" id=\"caseChips\">\n        <span class=\"chip active\" data-case=\"upper\">UPPER<\u002Fspan>\n        <span class=\"chip\" data-case=\"lower\">lower<\u002Fspan>\n        <span class=\"chip\" data-case=\"none\">None<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"label\">Curve effect<\u002Fdiv>\n      <div class=\"chipset\" id=\"curveChips\">\n        <span class=\"chip active\" data-curve=\"straight\">Straight<\u002Fspan>\n        <span class=\"chip\" data-curve=\"up\">Arch Up<\u002Fspan>\n        <span class=\"chip\" data-curve=\"down\">Arch Down<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"label\" style=\"margin-top:10px\">Curve intensity <span class=\"val\" id=\"curveIntVal\">40%<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"curveInt\" min=\"0\" max=\"100\" value=\"40\">\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"label\">Outline color<\u002Fdiv>\n      <div class=\"chipset\" id=\"outlineColorChips\">\n        <span class=\"chip color-chip active\" data-color=\"#FFFFFF\" style=\"background:#FFFFFF\"><\u002Fspan>\n        <span class=\"chip color-chip\" data-color=\"#F5E6D3\" style=\"background:#F5E6D3\"><\u002Fspan>\n        <span class=\"chip color-chip\" data-color=\"#0D0D0D\" style=\"background:#0D0D0D\"><\u002Fspan>\n        <span class=\"chip color-chip\" data-color=\"#B84A1F\" style=\"background:#B84A1F\"><\u002Fspan>\n        <input type=\"color\" id=\"outlineColor\" value=\"#FFFFFF\" style=\"width:28px;height:28px;border:2px solid var(--ink);padding:0;cursor:pointer;background:none\">\n      <\u002Fdiv>\n\n      <div class=\"label\" style=\"margin-top:12px\">Outline thickness <span class=\"val\" id=\"outlineThickVal\">18<\u002Fspan><\u002Fdiv>\n      <input type=\"range\" id=\"outlineThick\" min=\"0\" max=\"40\" value=\"18\">\n\n      <div class=\"label\" style=\"margin-top:10px\">Outline style<\u002Fdiv>\n      <div class=\"chipset\" id=\"outlineStyleChips\">\n        <span class=\"chip active\" data-style=\"solid\">Solid<\u002Fspan>\n        <span class=\"chip\" data-style=\"distressed\">Distressed<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <div class=\"label\">Preview background <span class=\"sub\">(export is transparent)<\u002Fspan><\u002Fdiv>\n      <div class=\"bg-picker\" id=\"bgPicker\">\n        <div class=\"bg-dot active\" data-bg=\"#5C3B28\" style=\"background:#5C3B28\"><\u002Fdiv>\n        <div class=\"bg-dot\" data-bg=\"#0D0D0D\" style=\"background:#0D0D0D\"><\u002Fdiv>\n        <div class=\"bg-dot\" data-bg=\"#FFFFFF\" style=\"background:#FFFFFF\"><\u002Fdiv>\n        <div class=\"bg-dot\" data-bg=\"#F5E6D3\" style=\"background:#F5E6D3\"><\u002Fdiv>\n        <div class=\"bg-dot\" data-bg=\"#2F4A33\" style=\"background:#2F4A33\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RIGHT PANEL -->\n  <section class=\"panel\" id=\"rightPanel\">\n    <div class=\"preview-head\">\n      <h2 style=\"margin:0\">Preview grid<\u002Fh2>\n      <div class=\"btn-row\">\n        <button class=\"btn\" id=\"regenBtn\">↻ Regenerate<\u002Fbutton>\n        <button class=\"btn primary\" id=\"zipBtn\">↓ Download All (ZIP)<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"gridHost\"><\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n<script>\n/* ============================================================\n   PATTERN PRESS — pattern-fill text design generator\n   Single-file, client-side. Exports 4500×5400 PNGs.\n============================================================ */\n\n/* --- Preset patterns built as SVG data URLs (procedural, offline) --- */\nfunction svgDataUrl(innerSvg, w, h){\n  const svg = `<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"${w}\" height=\"${h}\" viewBox=\"0 0 ${w} ${h}\">${innerSvg}<\u002Fsvg>`;\n  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);\n}\n\n/* Realtree-style camo: layered forest leaves over brown */\nfunction patRealtree(){\n  const leaves = [];\n  const rng = mulberry32(42);\n  for(let i=0;i<60;i++){\n    const x = rng()*512, y = rng()*512;\n    const r = 16 + rng()*28;\n    const rot = rng()*360;\n    const colors = ['#3b2d1a','#1f1a0f','#5a4a2b','#2a3a1a','#78632f','#0f1608'];\n    const c = colors[(rng()*colors.length)|0];\n    // leaf shape: ellipse\n    leaves.push(`<g transform=\"translate(${x} ${y}) rotate(${rot})\"><ellipse cx=\"0\" cy=\"0\" rx=\"${r}\" ry=\"${r*0.45}\" fill=\"${c}\" opacity=\"${0.6+rng()*0.4}\"/><path d=\"M${-r} 0 L${r} 0\" stroke=\"#0a0906\" stroke-width=\"1\" opacity=\".4\"/><\u002Fg>`);\n  }\n  const twigs = [];\n  for(let i=0;i<18;i++){\n    const x=rng()*512,y=rng()*512,len=30+rng()*80,rot=rng()*360;\n    twigs.push(`<line x1=\"${x}\" y1=\"${y}\" x2=\"${x+Math.cos(rot)*len}\" y2=\"${y+Math.sin(rot)*len}\" stroke=\"#1a120a\" stroke-width=\"${2+rng()*2}\"/>`);\n  }\n  const inner = `<rect width=\"512\" height=\"512\" fill=\"#4a3a23\"/>${twigs.join('')}${leaves.join('')}`;\n  return svgDataUrl(inner,512,512);\n}\nfunction patMossyOak(){\n  const rng = mulberry32(17);\n  const parts = [`<rect width=\"512\" height=\"512\" fill=\"#1a2612\"/>`];\n  // trunk slashes\n  for(let i=0;i<14;i++){\n    const x=rng()*512,y=rng()*512,w=6+rng()*10,h=80+rng()*160,rot=rng()*30-15;\n    parts.push(`<rect x=\"${x}\" y=\"${y}\" width=\"${w}\" height=\"${h}\" transform=\"rotate(${rot} ${x} ${y})\" fill=\"#0d1508\"/>`);\n  }\n  for(let i=0;i<70;i++){\n    const x=rng()*512,y=rng()*512,r=12+rng()*22,rot=rng()*360;\n    const colors=['#2f4a1e','#17230d','#4a6b28','#0a1205','#3a5824'];\n    const c=colors[(rng()*colors.length)|0];\n    parts.push(`<ellipse cx=\"${x}\" cy=\"${y}\" rx=\"${r}\" ry=\"${r*0.5}\" transform=\"rotate(${rot} ${x} ${y})\" fill=\"${c}\" opacity=\"${0.55+rng()*0.45}\"/>`);\n  }\n  return svgDataUrl(parts.join(''),512,512);\n}\nfunction patLeopard(){\n  const rng = mulberry32(7);\n  const parts = [`<rect width=\"512\" height=\"512\" fill=\"#d7b884\"/>`];\n  // golden wash\n  for(let i=0;i<40;i++){\n    const x=rng()*512,y=rng()*512,r=30+rng()*50;\n    parts.push(`<circle cx=\"${x}\" cy=\"${y}\" r=\"${r}\" fill=\"#c49968\" opacity=\".25\"/>`);\n  }\n  // black rosettes (cluster of 3-4 small dots around a ring)\n  for(let i=0;i<55;i++){\n    const cx=rng()*512,cy=rng()*512;\n    const rOuter=10+rng()*8;\n    const n=3+((rng()*3)|0);\n    let ring='';\n    for(let k=0;k<n;k++){\n      const a=(k/n)*Math.PI*2+rng()*0.3;\n      const px=cx+Math.cos(a)*rOuter;\n      const py=cy+Math.sin(a)*rOuter;\n      const pr=3+rng()*3.5;\n      ring+=`<circle cx=\"${px}\" cy=\"${py}\" r=\"${pr}\" fill=\"#1a0d04\"/>`;\n    }\n    // sometimes tan middle\n    if(rng()>0.4){\n      parts.push(`<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${rOuter*0.55}\" fill=\"#a87640\" opacity=\".65\"/>`);\n    }\n    parts.push(ring);\n  }\n  return svgDataUrl(parts.join(''),512,512);\n}\nfunction patCowPrint(){\n  const rng = mulberry32(99);\n  const parts = [`<rect width=\"512\" height=\"512\" fill=\"#FFFFFF\"/>`];\n  // splotches: blob made of unioned circles\n  for(let i=0;i<8;i++){\n    const cx=rng()*512,cy=rng()*512;\n    const blobs=[];\n    const n=5+((rng()*4)|0);\n    for(let k=0;k<n;k++){\n      const a=rng()*Math.PI*2;\n      const d=rng()*60;\n      const r=30+rng()*40;\n      blobs.push(`<circle cx=\"${cx+Math.cos(a)*d}\" cy=\"${cy+Math.sin(a)*d}\" r=\"${r}\" fill=\"#0a0a0a\"/>`);\n    }\n    parts.push(`<g>${blobs.join('')}<\u002Fg>`);\n  }\n  return svgDataUrl(parts.join(''),512,512);\n}\nfunction patAmericanFlag(){\n  // stylized repeating flag pattern\n  const stars=[];\n  for(let r=0;r<5;r++){\n    for(let c=0;c<6;c++){\n      const x=12+c*18+(r%2?9:0), y=14+r*18;\n      stars.push(starPath(x,y,5,5.5,2.2,'#FFFFFF'));\n    }\n  }\n  const stripes=[];\n  // 13 stripes across full width 512, but canton occupies top-left ~205x138\n  const stripeH=512/13;\n  for(let i=0;i<13;i++){\n    const color = i%2===0 ? '#B22234' : '#FFFFFF';\n    stripes.push(`<rect x=\"0\" y=\"${i*stripeH}\" width=\"512\" height=\"${stripeH}\" fill=\"${color}\"/>`);\n  }\n  const canton=`<rect x=\"0\" y=\"0\" width=\"205\" height=\"${stripeH*7}\" fill=\"#3C3B6E\"/>${stars.join('')}`;\n  return svgDataUrl(stripes.join('')+canton,512,512);\n}\nfunction starPath(cx,cy,n,rOut,rIn,fill){\n  let d='';\n  for(let i=0;i<n*2;i++){\n    const r=i%2===0?rOut:rIn;\n    const a=(i/(n*2))*Math.PI*2 - Math.PI/2;\n    d+=(i===0?'M':'L')+(cx+Math.cos(a)*r)+' '+(cy+Math.sin(a)*r)+' ';\n  }\n  return `<path d=\"${d}Z\" fill=\"${fill}\"/>`;\n}\nfunction patBuffaloPlaid(){\n  // classic red/black check\n  const s=64;\n  const parts=[`<rect width=\"512\" height=\"512\" fill=\"#B22222\"/>`];\n  // vertical dark stripes\n  for(let x=0;x<512;x+=s*2){\n    parts.push(`<rect x=\"${x}\" y=\"0\" width=\"${s}\" height=\"512\" fill=\"#0a0a0a\" opacity=\".55\"/>`);\n  }\n  // horizontal dark stripes\n  for(let y=0;y<512;y+=s*2){\n    parts.push(`<rect x=\"0\" y=\"${y}\" width=\"512\" height=\"${s}\" fill=\"#0a0a0a\" opacity=\".55\"/>`);\n  }\n  return svgDataUrl(parts.join(''),512,512);\n}\nfunction patWesternFloral(){\n  const rng = mulberry32(55);\n  const parts=[`<rect width=\"512\" height=\"512\" fill=\"#f5ead7\"/>`];\n  // muted roses: layered petals\n  for(let i=0;i<14;i++){\n    const cx=rng()*512,cy=rng()*512;\n    const rose=[];\n    // leaves\n    for(let k=0;k<3;k++){\n      const a=rng()*Math.PI*2;\n      rose.push(`<ellipse cx=\"${cx+Math.cos(a)*30}\" cy=\"${cy+Math.sin(a)*30}\" rx=\"22\" ry=\"10\" transform=\"rotate(${a*57} ${cx+Math.cos(a)*30} ${cy+Math.sin(a)*30})\" fill=\"#6b7d4a\" opacity=\".75\"/>`);\n    }\n    // rose petals\n    const petalColors=['#b8644c','#9e4a38','#c98872'];\n    const pc=petalColors[(rng()*petalColors.length)|0];\n    for(let k=0;k<6;k++){\n      const r=18-k*2;\n      rose.push(`<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${r}\" fill=\"${pc}\" opacity=\"${0.5+k*0.08}\"/>`);\n    }\n    rose.push(`<circle cx=\"${cx}\" cy=\"${cy}\" r=\"3\" fill=\"#4a2218\"/>`);\n    parts.push(`<g>${rose.join('')}<\u002Fg>`);\n  }\n  // tiny dots\n  for(let i=0;i<40;i++){\n    parts.push(`<circle cx=\"${rng()*512}\" cy=\"${rng()*512}\" r=\"${1+rng()*2}\" fill=\"#7a6b4a\" opacity=\".5\"/>`);\n  }\n  return svgDataUrl(parts.join(''),512,512);\n}\nfunction patWoodGrain(){\n  const rng=mulberry32(22);\n  const parts=[`<rect width=\"512\" height=\"512\" fill=\"#8b5a2b\"/>`];\n  // horizontal grain lines\n  for(let i=0;i<90;i++){\n    const y=rng()*512;\n    const col=['#5e3a16','#704520','#6a3f18','#9c6a38','#4a2d10'][(rng()*5)|0];\n    let d=`M0 ${y}`;\n    for(let x=0;x<=512;x+=16){\n      d+=` Q${x+8} ${y+(rng()*6-3)} ${x+16} ${y+(rng()*4-2)}`;\n    }\n    parts.push(`<path d=\"${d}\" stroke=\"${col}\" stroke-width=\"${1+rng()*2.5}\" fill=\"none\" opacity=\"${0.5+rng()*0.4}\"/>`);\n  }\n  // knots\n  for(let i=0;i<5;i++){\n    const cx=rng()*512,cy=rng()*512;\n    for(let k=0;k<6;k++){\n      parts.push(`<ellipse cx=\"${cx}\" cy=\"${cy}\" rx=\"${6+k*4}\" ry=\"${3+k*2}\" fill=\"none\" stroke=\"#3a2208\" stroke-width=\"1.5\" opacity=\"${0.8-k*0.1}\"/>`);\n    }\n  }\n  return svgDataUrl(parts.join(''),512,512);\n}\nfunction patSunflower(){\n  const rng=mulberry32(77);\n  const parts=[`<rect width=\"512\" height=\"512\" fill=\"#4a6b28\"/>`];\n  // subtle leaf wash\n  for(let i=0;i<30;i++){\n    parts.push(`<ellipse cx=\"${rng()*512}\" cy=\"${rng()*512}\" rx=\"${30+rng()*40}\" ry=\"${12+rng()*20}\" transform=\"rotate(${rng()*360} ${rng()*512} ${rng()*512})\" fill=\"#3a5820\" opacity=\".6\"/>`);\n  }\n  // sunflowers\n  for(let i=0;i<10;i++){\n    const cx=rng()*512,cy=rng()*512;\n    const petals=[];\n    for(let k=0;k<12;k++){\n      const a=(k/12)*Math.PI*2;\n      const px=cx+Math.cos(a)*28, py=cy+Math.sin(a)*28;\n      petals.push(`<ellipse cx=\"${px}\" cy=\"${py}\" rx=\"18\" ry=\"8\" transform=\"rotate(${a*57.3} ${px} ${py})\" fill=\"#f2b705\"/>`);\n    }\n    parts.push(`<g>${petals.join('')}<circle cx=\"${cx}\" cy=\"${cy}\" r=\"16\" fill=\"#6b4018\"/><circle cx=\"${cx}\" cy=\"${cy}\" r=\"10\" fill=\"#3a1f08\"/><\u002Fg>`);\n  }\n  return svgDataUrl(parts.join(''),512,512);\n}\nfunction patSerape(){\n  // multicolor horizontal stripes of varying widths\n  const rng=mulberry32(33);\n  const colors=['#c72a2a','#e07a2e','#e8bf2a','#2e9e6e','#2a6bbf','#6c2a9e','#f5ead7','#0d0d0d'];\n  const parts=[`<rect width=\"512\" height=\"512\" fill=\"#f5ead7\"/>`];\n  let y=0;\n  while(y<512){\n    const h=4+rng()*22;\n    const c=colors[(rng()*colors.length)|0];\n    parts.push(`<rect x=\"0\" y=\"${y}\" width=\"512\" height=\"${h}\" fill=\"${c}\"/>`);\n    // occasional zigzag detail\n    if(rng()>0.7){\n      let d=`M0 ${y+h/2}`;\n      for(let x=0;x<=512;x+=12){\n        d+=` L${x+6} ${y+h/2+(x%24===0?3:-3)}`;\n      }\n      parts.push(`<path d=\"${d}\" stroke=\"#0d0d0d\" stroke-width=\"1\" fill=\"none\" opacity=\".6\"/>`);\n    }\n    y+=h;\n  }\n  return svgDataUrl(parts.join(''),512,512);\n}\n\n/* seeded random */\nfunction mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}\n\nconst PRESETS = [\n  {id:'realtree',    name:'Realtree',    tile:512, url:patRealtree()},\n  {id:'mossyoak',    name:'Mossy Oak',   tile:512, url:patMossyOak()},\n  {id:'leopard',     name:'Leopard',     tile:512, url:patLeopard()},\n  {id:'cow',         name:'Cow Print',   tile:512, url:patCowPrint()},\n  {id:'flag',        name:'American',    tile:512, url:patAmericanFlag()},\n  {id:'buffalo',     name:'Buffalo',     tile:512, url:patBuffaloPlaid()},\n  {id:'westfloral',  name:'W. Floral',   tile:512, url:patWesternFloral()},\n  {id:'wood',        name:'Wood Grain',  tile:512, url:patWoodGrain()},\n  {id:'sunflower',   name:'Sunflower',   tile:512, url:patSunflower()},\n  {id:'serape',      name:'Serape',      tile:512, url:patSerape()},\n];\n\n/* ============================================================\n   State\n============================================================ */\nconst DEFAULTS = {\n  patternId: 'realtree',\n  scale: 100, offsetX: 0, offsetY: 0,\n  font: 'Anton',\n  fontSize: 900,\n  letterSpacing: -10,\n  textCase: 'upper',\n  curve: 'straight',\n  curveInt: 40,\n  outlineColor: '#FFFFFF',\n  outlineThick: 18,\n  outlineStyle: 'solid',\n  bg: '#5C3B28',\n  slogans: `DARLIN'\\nMAMA\\nHOWDY\\nY'ALL\\nHOT MESS\\nWILD CHILD\\nCOWGIRL\\nCOUNTRY ROOTS`,\n};\nconst LS_KEY = 'patternpress_v1';\nconst LS_CUSTOM = 'patternpress_custom_v1';\nconst LS_SAVED = 'patternpress_saved_v1';\n\nlet state = {...DEFAULTS};\nlet customPatterns = []; // {id,name,url,tile}\nlet savedPresets = [];   // {name, state, patternRef}\n\nfunction loadState(){\n  try{\n    const s=JSON.parse(localStorage.getItem(LS_KEY)||'null');\n    if(s) state = {...DEFAULTS, ...s};\n    const c=JSON.parse(localStorage.getItem(LS_CUSTOM)||'null');\n    if(Array.isArray(c)) customPatterns = c;\n    const p=JSON.parse(localStorage.getItem(LS_SAVED)||'null');\n    if(Array.isArray(p)) savedPresets = p;\n  }catch(e){}\n}\nfunction persist(){\n  localStorage.setItem(LS_KEY, JSON.stringify(state));\n  localStorage.setItem(LS_CUSTOM, JSON.stringify(customPatterns));\n  localStorage.setItem(LS_SAVED, JSON.stringify(savedPresets));\n}\n\n/* ============================================================\n   DOM references\n============================================================ */\nconst $ = id => document.getElementById(id);\nconst presetGrid = $('presetGrid');\nconst gridHost = $('gridHost');\nconst toast = $('toast');\n\n/* ============================================================\n   Init UI state bindings\n============================================================ */\nfunction applyStateToUI(){\n  $('scale').value = state.scale;       $('scaleVal').textContent = state.scale+'%';\n  $('offsetX').value = state.offsetX;   $('offsetXVal').textContent = state.offsetX;\n  $('offsetY').value = state.offsetY;   $('offsetYVal').textContent = state.offsetY;\n  $('slogans').value = state.slogans;\n  $('font').value = state.font;\n  $('fontSize').value = state.fontSize; $('fontSizeVal').textContent = state.fontSize;\n  $('letterSpacing').value = state.letterSpacing; $('letterSpacingVal').textContent = state.letterSpacing;\n  $('curveInt').value = state.curveInt; $('curveIntVal').textContent = state.curveInt+'%';\n  $('outlineColor').value = state.outlineColor;\n  $('outlineThick').value = state.outlineThick; $('outlineThickVal').textContent = state.outlineThick;\n\n  // chips\n  document.querySelectorAll('#caseChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.case===state.textCase));\n  document.querySelectorAll('#curveChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.curve===state.curve));\n  document.querySelectorAll('#outlineColorChips .chip').forEach(c=>{\n    if(c.dataset) c.classList.toggle('active', (c.dataset.color||'').toUpperCase()===state.outlineColor.toUpperCase());\n  });\n  document.querySelectorAll('#outlineStyleChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.style===state.outlineStyle));\n  document.querySelectorAll('#bgPicker .bg-dot').forEach(d=>d.classList.toggle('active',d.dataset.bg.toUpperCase()===state.bg.toUpperCase()));\n}\n\nfunction bindControls(){\n  // sliders\n  const sliders = [\n    ['scale','scaleVal',v=>v+'%'],\n    ['offsetX','offsetXVal',v=>v],\n    ['offsetY','offsetYVal',v=>v],\n    ['fontSize','fontSizeVal',v=>v],\n    ['letterSpacing','letterSpacingVal',v=>v],\n    ['curveInt','curveIntVal',v=>v+'%'],\n    ['outlineThick','outlineThickVal',v=>v],\n  ];\n  sliders.forEach(([id,valId,fmt])=>{\n    const el = $(id);\n    el.addEventListener('input', ()=>{\n      state[id] = +el.value;\n      $(valId).textContent = fmt(el.value);\n      renderGridDebounced();\n      persistDebounced();\n    });\n  });\n  $('slogans').addEventListener('input', ()=>{state.slogans=$('slogans').value;renderGridDebounced();persistDebounced()});\n  $('font').addEventListener('change', ()=>{state.font=$('font').value;renderGridDebounced();persistDebounced()});\n  $('outlineColor').addEventListener('input', ()=>{\n    state.outlineColor=$('outlineColor').value.toUpperCase();\n    document.querySelectorAll('#outlineColorChips .chip').forEach(c=>c.classList.remove('active'));\n    renderGridDebounced();persistDebounced();\n  });\n\n  // chips\n  document.querySelectorAll('#caseChips .chip').forEach(c=>c.addEventListener('click',()=>{\n    state.textCase=c.dataset.case;\n    document.querySelectorAll('#caseChips .chip').forEach(x=>x.classList.toggle('active',x===c));\n    renderGridDebounced();persistDebounced();\n  }));\n  document.querySelectorAll('#curveChips .chip').forEach(c=>c.addEventListener('click',()=>{\n    state.curve=c.dataset.curve;\n    document.querySelectorAll('#curveChips .chip').forEach(x=>x.classList.toggle('active',x===c));\n    renderGridDebounced();persistDebounced();\n  }));\n  document.querySelectorAll('#outlineColorChips .chip.color-chip').forEach(c=>c.addEventListener('click',()=>{\n    state.outlineColor=c.dataset.color;\n    $('outlineColor').value = c.dataset.color;\n    document.querySelectorAll('#outlineColorChips .chip').forEach(x=>x.classList.toggle('active',x===c));\n    renderGridDebounced();persistDebounced();\n  }));\n  document.querySelectorAll('#outlineStyleChips .chip').forEach(c=>c.addEventListener('click',()=>{\n    state.outlineStyle=c.dataset.style;\n    document.querySelectorAll('#outlineStyleChips .chip').forEach(x=>x.classList.toggle('active',x===c));\n    renderGridDebounced();persistDebounced();\n  }));\n  document.querySelectorAll('#bgPicker .bg-dot').forEach(d=>d.addEventListener('click',()=>{\n    state.bg=d.dataset.bg;\n    document.querySelectorAll('#bgPicker .bg-dot').forEach(x=>x.classList.toggle('active',x===d));\n    renderGridDebounced();persistDebounced();\n  }));\n\n  // upload\n  const uz = $('uploadZone'), fi = $('fileInput');\n  uz.addEventListener('click',()=>fi.click());\n  uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag')});\n  uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));\n  uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag');handleFiles(e.dataTransfer.files)});\n  fi.addEventListener('change',()=>handleFiles(fi.files));\n\n  // font upload\n  const fu = document.getElementById('fontUpload');\n  if(fu) fu.addEventListener('change',()=>handleFontFiles(fu.files));\n\n  // buttons\n  $('savePresetBtn').addEventListener('click',savePreset);\n  $('zipBtn').addEventListener('click',downloadAll);\n  $('regenBtn').addEventListener('click',()=>renderGrid());\n}\n\nfunction handleFiles(files){\n  [...files].forEach(f=>{\n    const reader=new FileReader();\n    reader.onload=()=>{\n      const id='custom_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);\n      const name = f.name.replace(/\\.[^.]+$/,'').slice(0,10) || 'Custom';\n      customPatterns.push({id,name,url:reader.result,tile:512,custom:true});\n      state.patternId = id;\n      renderPresets();\n      renderGridDebounced();\n      persist();\n    };\n    reader.readAsDataURL(f);\n  });\n}\n\n/* ============================================================\n   Pattern grid\n============================================================ */\nfunction renderPresets(){\n  presetGrid.innerHTML='';\n  const all = [...PRESETS, ...customPatterns];\n  $('patternCount').textContent = `${all.length} total`;\n  all.forEach(p=>{\n    const el = document.createElement('div');\n    el.className='swatch'+(p.id===state.patternId?' active':'')+(p.custom?' custom':'');\n    el.style.backgroundImage=`url(\"${p.url}\")`;\n    el.style.backgroundSize='cover';\n    el.innerHTML = `<div class=\"name\">${p.name}<\u002Fdiv>${p.custom?'<button class=\"del\" title=\"delete\">×<\u002Fbutton>':''}`;\n    el.addEventListener('click',(e)=>{\n      if(e.target.classList.contains('del')){\n        e.stopPropagation();\n        customPatterns = customPatterns.filter(x=>x.id!==p.id);\n        if(state.patternId===p.id) state.patternId = PRESETS[0].id;\n        renderPresets(); renderGridDebounced(); persist(); return;\n      }\n      state.patternId=p.id;\n      renderPresets(); renderGridDebounced(); persist();\n    });\n    presetGrid.appendChild(el);\n  });\n}\n\nfunction getActivePattern(){\n  return [...PRESETS,...customPatterns].find(p=>p.id===state.patternId) || PRESETS[0];\n}\n\n/* ============================================================\n   Font registry (built-in + custom uploaded)\n============================================================ */\nconst BUILTIN_FONTS = [\n  {name:'Anton',               category:'Google', recommended:true},\n  {name:'Archivo Black',       category:'Google'},\n  {name:'Bebas Neue',          category:'Google'},\n  {name:'Bungee',              category:'Google'},\n  {name:'Oswald',              category:'Google', label:'Oswald Bold'},\n  {name:'Abril Fatface',       category:'Google'},\n  {name:'DM Serif Display',    category:'Google'},\n  {name:'Permanent Marker',    category:'Google'},\n  {name:'Playfair Display',    category:'Google', label:'Playfair Display Black'},\n  {name:'Fraunces',            category:'Google', label:'Fraunces Black'},\n];\nlet customFonts = []; // {name, dataUrl, format}\nconst LS_FONTS = 'patternpress_fonts_v1';\n// cached data URLs for local-file custom fonts (fetched once for SVG export embedding)\nconst _fontDataUrlCache = {};\n\nasync function fetchFontAsDataUrl(url){\n  if(_fontDataUrlCache[url]) return _fontDataUrlCache[url];\n  try{\n    const r = await fetch(url);\n    const blob = await r.blob();\n    const dataUrl = await new Promise((res,rej)=>{\n      const fr = new FileReader();\n      fr.onload = ()=>res(fr.result);\n      fr.onerror = rej;\n      fr.readAsDataURL(blob);\n    });\n    _fontDataUrlCache[url] = dataUrl;\n    return dataUrl;\n  }catch(e){ console.warn('Font fetch failed', url, e); return null; }\n}\n\nfunction allFonts(){ return [...BUILTIN_FONTS, ...customFonts.map(f=>({name:f.name, category:'Custom', url:f.dataUrl, format:f.format||'opentype', uploaded:true}))]; }\nfunction findFontEntry(name){ return allFonts().find(f=>f.name===name); }\n\nfunction loadCustomFonts(){\n  try{\n    const c = JSON.parse(localStorage.getItem(LS_FONTS)||'null');\n    if(Array.isArray(c)) customFonts = c;\n  }catch(e){}\n  // register each custom font via @font-face using data URL\n  customFonts.forEach(f=>registerFontFace(f.name, f.dataUrl, f.format||'opentype'));\n}\nfunction persistCustomFonts(){ localStorage.setItem(LS_FONTS, JSON.stringify(customFonts)); }\n\nfunction registerFontFace(name, url, format){\n  const styleTag = document.getElementById('dynamicFontFaces') || (()=>{\n    const s = document.createElement('style'); s.id='dynamicFontFaces'; document.head.appendChild(s); return s;\n  })();\n  styleTag.appendChild(document.createTextNode(\n    `@font-face{font-family:'${name}';src:url('${url}') format('${format}');font-weight:400 900;font-display:block}`\n  ));\n  // proactively load\n  if(document.fonts && document.fonts.load){\n    try{ document.fonts.load(`900 64px '${name}'`); }catch(e){}\n  }\n}\n\nfunction renderFontSelect(){\n  const sel = $('font');\n  const prev = state.font;\n  sel.innerHTML = '';\n  const groups = {Google:[], Custom:[]};\n  allFonts().forEach(f=>groups[f.category||'Custom'].push(f));\n  const addGroup = (label, list)=>{\n    if(!list.length) return;\n    const og = document.createElement('optgroup'); og.label = label;\n    list.forEach(f=>{\n      const o = document.createElement('option');\n      o.value = f.name;\n      o.textContent = (f.label||f.name) + (f.recommended?' (recommended)':'');\n      og.appendChild(o);\n    });\n    sel.appendChild(og);\n  };\n  addGroup('Display fonts', groups.Google);\n  addGroup('Custom fonts', groups.Custom);\n  sel.value = prev;\n}\n\nasync function handleFontFiles(files){\n  for(const f of files){\n    const reader = new FileReader();\n    const dataUrl = await new Promise((res,rej)=>{\n      reader.onload = ()=>res(reader.result);\n      reader.onerror = rej;\n      reader.readAsDataURL(f);\n    });\n    const ext = (f.name.split('.').pop()||'').toLowerCase();\n    const format = ext==='ttf'?'truetype': ext==='woff'?'woff': ext==='woff2'?'woff2':'opentype';\n    // strip extension and clean name\n    let name = f.name.replace(/\\.[^.]+$/,'').replace(/[_-]+/g,' ').trim();\n    name = name.replace(/\\b\\w/g, c=>c.toUpperCase()).slice(0,40) || 'Custom Font';\n    // avoid collision\n    if(allFonts().some(x=>x.name===name)) name += ' ' + Math.floor(Math.random()*99);\n    customFonts.push({name, dataUrl, format});\n    registerFontFace(name, dataUrl, format);\n  }\n  persistCustomFonts();\n  renderFontSelect();\n  showToast('Font added');\n}\n\nfunction fontStackFor(name){\n  // SVG export fontStack for safety\n  return `'${name}', 'Anton', sans-serif`;\n}\n\n/* ============================================================\n   SVG rendering\n============================================================ */\nconst CANVAS_W = 4500, CANVAS_H = 5400;\n\nfunction transformSlogan(s){\n  if(state.textCase==='upper') return s.toUpperCase();\n  if(state.textCase==='lower') return s.toLowerCase();\n  return s;\n}\n\nfunction escapeXml(s){\n  return s.replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&apos;');\n}\n\n/**\n * Build SVG string for one slogan.\n * @param {string} slogan\n * @param {object} opts {forExport:boolean (transparent vs with preview bg)}\n */\n// hidden measuring SVG for text width\nlet _measureSvg = null;\nfunction measureTextWidth(text, fontFamily, fontSize, letterSpacing){\n  if(!_measureSvg){\n    _measureSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');\n    _measureSvg.setAttribute('width','0'); _measureSvg.setAttribute('height','0');\n    _measureSvg.style.position='absolute'; _measureSvg.style.visibility='hidden';\n    _measureSvg.style.pointerEvents='none';\n    document.body.appendChild(_measureSvg);\n  }\n  const t = document.createElementNS('http://www.w3.org/2000/svg','text');\n  t.setAttribute('font-family', fontFamily);\n  t.setAttribute('font-size', fontSize);\n  t.setAttribute('letter-spacing', letterSpacing);\n  t.setAttribute('font-weight','900');\n  t.textContent = text;\n  _measureSvg.appendChild(t);\n  const bb = t.getBBox();\n  _measureSvg.removeChild(t);\n  return bb;\n}\n\nfunction buildSvg(slogan, opts={}){\n  const text = transformSlogan(slogan);\n  const pat = getActivePattern();\n  const tile = pat.tile * (state.scale/100);\n  const patTransform = `translate(${state.offsetX*4} ${state.offsetY*4})`;\n  const thick = state.outlineThick * 8; // scale to canvas\n  // Treat the fontSize slider as a \"max box\" scale factor (300..1600 → 0.5..1.0 of safe area height).\n  const sliderNorm = Math.max(0.35, Math.min(1, (state.fontSize - 200) / 1400));\n  let fontSize = state.fontSize * 4;\n  let letterSpacing = state.letterSpacing * 4;\n\n  // Auto-fit: measure text at current font-size, then scale so it fits a target box.\n  // target width: 88% of canvas; target height: 72% * sliderNorm\n  const maxW = CANVAS_W * 0.88;\n  const maxH = CANVAS_H * 0.72 * sliderNorm;\n  const fontStackMeasure = `'${state.font}', 'Anton', sans-serif`;\n  try{\n    const bb = measureTextWidth(text, fontStackMeasure, fontSize, letterSpacing);\n    if(bb && bb.width > 0 && bb.height > 0){\n      const scaleFit = Math.min(maxW / bb.width, maxH / bb.height);\n      // Always apply the scale — grows small text up to the max, shrinks big text to fit\n      fontSize = fontSize * scaleFit;\n      letterSpacing = letterSpacing * scaleFit;\n    }\n  }catch(e){}\n  const filterId = 'distressed_'+Math.random().toString(36).slice(2,8);\n  const patId = 'pat_'+Math.random().toString(36).slice(2,8);\n  const pathId = 'path_'+Math.random().toString(36).slice(2,8);\n\n  // distressed filter: displacement map\n  const filterDef = state.outlineStyle==='distressed'\n    ? `<filter id=\"${filterId}\" x=\"-5%\" y=\"-5%\" width=\"110%\" height=\"110%\">\n         <feTurbulence type=\"fractalNoise\" baseFrequency=\"0.02\" numOctaves=\"2\" seed=\"7\"/>\n         <feDisplacementMap in=\"SourceGraphic\" scale=\"14\"/>\n       <\u002Ffilter>`\n    : '';\n\n  // curve path\n  const curveI = state.curveInt/100;\n  let pathDef = '';\n  let useTextPath = state.curve!=='straight' && curveI>0.02;\n  // Baseline centered at y=cy; arch radius grows with intensity\n  const cx = CANVAS_W/2;\n  const cy = CANVAS_H/2 + fontSize*0.32; // approximate baseline for centered text\n  // arc width: usable width\n  const arcW = CANVAS_W * 0.82;\n  // sagitta based on intensity\n  const sag = curveI * CANVAS_H * 0.28;\n  if(useTextPath){\n    // Build arc path\n    // radius from sagitta + chord\n    const r = (sag/2) + (arcW*arcW)/(8*Math.max(sag,1));\n    if(state.curve==='up'){\n      // path goes left->right along arc bulging upward\n      // start & end y baseline - sag/2 adjusted\n      const startX = cx - arcW/2;\n      const endX   = cx + arcW/2;\n      const y0 = cy;\n      pathDef = `M ${startX} ${y0} A ${r} ${r} 0 0 1 ${endX} ${y0}`;\n    } else { // down\n      const startX = cx - arcW/2;\n      const endX   = cx + arcW/2;\n      const y0 = cy - sag; // start higher so arc dips down\n      pathDef = `M ${startX} ${y0} A ${r} ${r} 0 0 0 ${endX} ${y0}`;\n    }\n  }\n\n  const bg = opts.forExport ? 'transparent' : state.bg;\n  const bgRect = opts.forExport ? '' : `<rect width=\"${CANVAS_W}\" height=\"${CANVAS_H}\" fill=\"${bg}\"/>`;\n\n  // text common attrs\n  const fontStack = `'${state.font}', 'Anton', sans-serif`;\n  const textAttrs = `font-family=\"${fontStack}\" font-size=\"${fontSize}\" letter-spacing=\"${letterSpacing}\" font-weight=\"900\"`;\n  const strokeAttrs = thick>0\n    ? `stroke=\"${state.outlineColor}\" stroke-width=\"${thick}\" stroke-linejoin=\"round\" stroke-linecap=\"round\" paint-order=\"stroke fill\"`\n    : '';\n  const filterAttr = state.outlineStyle==='distressed' ? `filter=\"url(#${filterId})\"` : '';\n  const textContent = escapeXml(text);\n\n  let textEl;\n  if(useTextPath){\n    textEl = `<text ${textAttrs} fill=\"url(#${patId})\" ${strokeAttrs} ${filterAttr}>\n      <textPath href=\"#${pathId}\" startOffset=\"50%\" text-anchor=\"middle\">${textContent}<\u002FtextPath>\n    <\u002Ftext>`;\n  } else {\n    textEl = `<text x=\"${cx}\" y=\"${cy}\" text-anchor=\"middle\" ${textAttrs} fill=\"url(#${patId})\" ${strokeAttrs} ${filterAttr}>${textContent}<\u002Ftext>`;\n  }\n\n  // Embed @font-face inside the SVG for export, so PNG rendering has the custom font.\n  // Caller must pass opts.fontDataUrl (pre-fetched) when forExport is true.\n  let fontFaceStyle = '';\n  if(opts.forExport && opts.fontDataUrl){\n    const fmt = opts.fontFormat || 'opentype';\n    fontFaceStyle = `<style type=\"text/css\"><![CDATA[\n        @font-face{font-family:'${state.font}';src:url('${opts.fontDataUrl}') format('${fmt}');font-weight:400 900;font-display:block}\n      ]]><\u002Fstyle>`;\n  }\n\n  return `<svg xmlns=\"http://www.w3.org/2000/svg\" xmlns:xlink=\"http://www.w3.org/1999/xlink\" viewBox=\"0 0 ${CANVAS_W} ${CANVAS_H}\" width=\"${CANVAS_W}\" height=\"${CANVAS_H}\">\n    <defs>\n      ${fontFaceStyle}\n      <pattern id=\"${patId}\" patternUnits=\"userSpaceOnUse\" width=\"${tile}\" height=\"${tile}\" patternTransform=\"${patTransform}\">\n        <image href=\"${pat.url}\" xlink:href=\"${pat.url}\" width=\"${tile}\" height=\"${tile}\" preserveAspectRatio=\"xMidYMid slice\"/>\n      <\u002Fpattern>\n      ${filterDef}\n      ${useTextPath?`<path id=\"${pathId}\" d=\"${pathDef}\" fill=\"none\"/>`:''}\n    <\u002Fdefs>\n    ${bgRect}\n    ${textEl}\n  <\u002Fsvg>`;\n}\n\n/* ============================================================\n   Grid preview\n============================================================ */\nlet renderToken = 0;\nlet renderTimer = null;\nfunction renderGridDebounced(){\n  clearTimeout(renderTimer);\n  renderTimer = setTimeout(renderGrid, 120);\n}\nlet persistTimer=null;\nfunction persistDebounced(){clearTimeout(persistTimer);persistTimer=setTimeout(persist,200)}\n\nfunction getSloganList(){\n  return state.slogans.split('\\n').map(s=>s.trim()).filter(Boolean);\n}\n\nfunction renderGrid(){\n  const my = ++renderToken;\n  const slogans = getSloganList();\n  if(!slogans.length){\n    gridHost.innerHTML = `<div class=\"empty\"><div class=\"big\">No slogans<\u002Fdiv><div>Add one or more slogans in the left panel.<\u002Fdiv><\u002Fdiv>`;\n    return;\n  }\n  const grid = document.createElement('div');\n  grid.className='grid';\n  slogans.forEach((slogan,i)=>{\n    const card = document.createElement('div');\n    card.className='card';\n    const prev = document.createElement('div');\n    prev.className='preview';\n    prev.style.background = state.bg;\n    prev.innerHTML = buildSvg(slogan,{forExport:false});\n    const meta = document.createElement('div');\n    meta.className='meta';\n    const slug = slugify(slogan);\n    meta.innerHTML = `<div class=\"slogan\">${escapeXml(slogan)}<\u002Fdiv>`;\n    const btn = document.createElement('button');\n    btn.textContent='↓ PNG';\n    btn.addEventListener('click',async ()=>{\n      btn.textContent='...';\n      try{ await downloadOne(slogan); }\n      catch(e){ console.error(e); showToast('Export failed'); }\n      btn.textContent='↓ PNG';\n    });\n    meta.appendChild(btn);\n    card.appendChild(prev);\n    card.appendChild(meta);\n    grid.appendChild(card);\n  });\n  if(my!==renderToken) return;\n  gridHost.innerHTML='';\n  gridHost.appendChild(grid);\n}\n\nfunction slugify(s){\n  return s.toLowerCase().replace(/['\"’]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'slogan';\n}\n\n/* ============================================================\n   Export pipeline\n============================================================ */\nasync function waitFonts(){\n  if(document.fonts && document.fonts.ready){ await document.fonts.ready; }\n}\n\nasync function svgToPngBlob(svgStr){\n  // preload the pattern image (important for Safari) by embedding as-is; image is already a data URL\n  // Serialize and load\n  const blob = new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});\n  const url = URL.createObjectURL(blob);\n  try{\n    const img = await new Promise((res,rej)=>{\n      const i = new Image();\n      i.crossOrigin='anonymous';\n      i.onload=()=>res(i);\n      i.onerror=e=>rej(new Error('img load fail'));\n      i.src=url;\n    });\n    const canvas = document.createElement('canvas');\n    canvas.width = CANVAS_W;\n    canvas.height = CANVAS_H;\n    const ctx = canvas.getContext('2d');\n    ctx.clearRect(0,0,CANVAS_W,CANVAS_H);\n    ctx.drawImage(img,0,0,CANVAS_W,CANVAS_H);\n    const pngBlob = await new Promise(res=>canvas.toBlob(res,'image/png'));\n    return pngBlob;\n  } finally {\n    URL.revokeObjectURL(url);\n  }\n}\n\nasync function prepareFontForExport(){\n  const entry = findFontEntry(state.font);\n  if(!entry || !entry.url) return {fontDataUrl:null, fontFormat:null};\n  let src = entry.url;\n  if(!src.startsWith('data:')){\n    src = await fetchFontAsDataUrl(entry.url) || entry.url;\n  }\n  return {fontDataUrl:src, fontFormat:entry.format||'opentype'};\n}\n\nasync function downloadOne(slogan){\n  setStatus('Rendering…');\n  await waitFonts();\n  const fontInfo = await prepareFontForExport();\n  const svg = buildSvg(slogan,{forExport:true, ...fontInfo});\n  const blob = await svgToPngBlob(svg);\n  const url = URL.createObjectURL(blob);\n  const pat = getActivePattern();\n  const a = document.createElement('a');\n  a.href=url;\n  a.download = `${slugify(pat.name)}-${slugify(slogan)}.png`;\n  document.body.appendChild(a); a.click(); a.remove();\n  setTimeout(()=>URL.revokeObjectURL(url),2000);\n  setStatus('Ready');\n  showToast('Downloaded');\n}\n\nasync function downloadAll(){\n  const slogans = getSloganList();\n  if(!slogans.length){ showToast('No slogans'); return; }\n  if(typeof JSZip==='undefined'){ showToast('JSZip not loaded'); return; }\n  setStatus('Building ZIP…');\n  await waitFonts();\n  const fontInfo = await prepareFontForExport();\n  const zip = new JSZip();\n  const pat = getActivePattern();\n  for(let i=0;i<slogans.length;i++){\n    setStatus(`Rendering ${i+1}/${slogans.length}…`);\n    const svg = buildSvg(slogans[i],{forExport:true, ...fontInfo});\n    try{\n      const blob = await svgToPngBlob(svg);\n      const buf = await blob.arrayBuffer();\n      zip.file(`${slugify(pat.name)}-${slugify(slogans[i])}.png`, buf);\n    }catch(e){ console.error('Slogan failed',slogans[i],e); }\n    await new Promise(r=>setTimeout(r,10));\n  }\n  setStatus('Zipping…');\n  const content = await zip.generateAsync({type:'blob'});\n  const url = URL.createObjectURL(content);\n  const a = document.createElement('a');\n  a.href=url;\n  a.download=`${slugify(pat.name)}-pattern-designs.zip`;\n  document.body.appendChild(a); a.click(); a.remove();\n  setTimeout(()=>URL.revokeObjectURL(url),2000);\n  setStatus('Ready');\n  showToast(`Exported ${slogans.length} designs`);\n}\n\n/* ============================================================\n   Saved presets\n============================================================ */\nfunction renderSaved(){\n  const host = $('savedList');\n  host.innerHTML='';\n  if(!savedPresets.length){\n    host.innerHTML = `<div class=\"sub\" style=\"padding:6px 2px\">No presets saved yet.<\u002Fdiv>`;\n    return;\n  }\n  savedPresets.forEach((p,idx)=>{\n    const row = document.createElement('div');\n    row.className='saved-item';\n    row.innerHTML = `<span>${escapeXml(p.name)}<\u002Fspan>\n      <div class=\"actions\">\n        <button data-act=\"load\">Load<\u002Fbutton>\n        <button data-act=\"del\">×<\u002Fbutton>\n      <\u002Fdiv>`;\n    row.querySelector('[data-act=\"load\"]').addEventListener('click',()=>{\n      // restore state + pattern (and inject custom pattern if absent)\n      const s = p.state;\n      if(p.customPattern && !customPatterns.find(c=>c.id===p.customPattern.id)){\n        customPatterns.push(p.customPattern);\n      }\n      state = {...DEFAULTS, ...s};\n      applyStateToUI();\n      renderPresets();\n      renderGrid();\n      persist();\n      showToast('Preset loaded');\n    });\n    row.querySelector('[data-act=\"del\"]').addEventListener('click',()=>{\n      savedPresets.splice(idx,1);\n      renderSaved();\n      persist();\n    });\n    host.appendChild(row);\n  });\n}\nfunction savePreset(){\n  const name = prompt('Preset name:', `Preset ${savedPresets.length+1}`);\n  if(!name) return;\n  const entry = {name, state:{...state}};\n  // Stash the custom pattern if active\n  const active = getActivePattern();\n  if(active.custom) entry.customPattern = active;\n  savedPresets.push(entry);\n  persist();\n  renderSaved();\n  showToast('Saved preset');\n}\n\n/* ============================================================\n   Misc\n============================================================ */\nfunction setStatus(s){ $('statusPill').textContent=s; }\nfunction showToast(m){\n  toast.textContent=m;\n  toast.classList.add('show');\n  clearTimeout(showToast._t);\n  showToast._t = setTimeout(()=>toast.classList.remove('show'),1600);\n}\n\n/* ============================================================\n   Boot\n============================================================ */\nloadState();\nloadCustomFonts();\nrenderFontSelect();\napplyStateToUI();\nrenderPresets();\nrenderSaved();\nbindControls();\n// initial render after fonts ready\nwaitFonts().then(renderGrid);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
